app = "agentprobe-api"
primary_region = "jnb"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "agentprobe_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  AGENTPROBE_DB = "/data/agentprobe.db"
  CERT_DB = "/data/certifications.db"
  DOMAIN = "https://agentprobe.vercel.app"
